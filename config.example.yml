device:
  port: /dev/ttyACM0
  baudrate: 9600
  reconnect: true
  reconnect_delay: 5       # seconds between reconnect attempts

zmq:
  enabled: true
  address: tcp://127.0.0.1:5557

mqtt:
  enabled: false
  broker: localhost
  port: 1883
  topic: gps/data
  username: ""
  password: ""

api:
  enabled: true
  host: 0.0.0.0
  port: 8080

logging:
  level: INFO              # DEBUG, INFO, WARNING, ERROR
  csv:
    enabled: false
    path: gps_log.csv
  gpx:
    enabled: false
    path: gps_track.gpx
